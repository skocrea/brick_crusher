<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Our Products</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f1eb;
      --surface: #faf8f5;
      --ink: #1a1410;
      --ink-muted: #7a6f64;
      --accent: #b85c2c;
      --accent-light: #f0e8df;
      --border: #e0d8ce;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.5;
    }

    header {
      padding: 3.5rem 4rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      animation: fadeDown 0.7s ease both;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.85rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--ink);
    }

    .logo span {
      color: var(--accent);
      font-style: italic;
    }

    .tagline {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .shop-intro {
      padding: 3.5rem 4rem 1.5rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      animation: fadeDown 0.7s 0.1s ease both;
    }

    .shop-intro h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 5vw, 4.5rem);
      font-weight: 300;
      line-height: 1.05;
      letter-spacing: -0.01em;
    }

    .shop-intro h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .item-count {
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-muted);
      padding-bottom: 0.4rem;
    }

    /* Grid */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1px;
      background: var(--border);
      border-top: 1px solid var(--border);
      margin-top: 2.5rem;
    }

    .product-card {
      background: var(--surface);
      display: flex;
      flex-direction: column;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(18px);
      animation: cardIn 0.55s ease forwards;
    }

    .product-card:nth-child(1) { animation-delay: 0.15s; }
    .product-card:nth-child(2) { animation-delay: 0.22s; }
    .product-card:nth-child(3) { animation-delay: 0.29s; }
    .product-card:nth-child(4) { animation-delay: 0.36s; }
    .product-card:nth-child(5) { animation-delay: 0.43s; }
    .product-card:nth-child(6) { animation-delay: 0.50s; }
    .product-card:nth-child(7) { animation-delay: 0.57s; }
    .product-card:nth-child(8) { animation-delay: 0.64s; }

    .product-card:hover .img-wrap img {
      transform: scale(1.06);
    }

    .product-card:hover .add-btn {
      opacity: 1;
      transform: translateY(0);
    }

    .img-wrap {
      position: relative;
      aspect-ratio: 4/3;
      overflow: hidden;
      background: var(--accent-light);
    }

    .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      display: block;
    }

    .badge {
      position: absolute;
      top: 1rem;
      left: 1rem;
      background: var(--accent);
      color: #fff;
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 0.25rem 0.6rem;
      font-weight: 500;
    }

    .card-body {
      padding: 1.4rem 1.5rem 1.6rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .category {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .product-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-weight: 400;
      line-height: 1.25;
      color: var(--ink);
      margin-top: 0.1rem;
    }

    .product-desc {
      font-size: 0.8rem;
      color: var(--ink-muted);
      line-height: 1.55;
      margin-top: 0.2rem;
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1.1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--ink);
    }

    .add-btn {
      background: var(--ink);
      color: var(--surface);
      border: none;
      padding: 0.55rem 1.1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.25s ease, transform 0.25s ease, background 0.2s ease;
    }

    .add-btn:hover {
      background: var(--accent);
    }

    footer {
      padding: 2.5rem 4rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0;
    }

    .footer-note {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--ink-muted);
      text-transform: uppercase;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      header, .shop-intro, footer { padding: 2rem 1.5rem; }
      .shop-intro { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Maison<span>Craft</span></div>
  <div class="tagline">Handcrafted · Thoughtfully Made</div>
</header>

<div class="shop-intro">
  <h1>Our <em>Collection</em></h1>
  <div class="item-count">8 products</div>
</div>

<div class="product-grid" id="grid"></div>

<footer>
  <div class="footer-note">© 2026 MaisonCraft</div>
  <div class="footer-note">Free shipping on orders over $75</div>
</footer>

<script>
  const products = [
    {
      name: "Linen Throw Pillow",
      category: "Home Textiles",
      desc: "Stone-washed Belgian linen in a palette of earthy neutrals. Pre-washed for softness from day one.",
      price: 48,
      badge: null,
      img: "https://images.unsplash.com/photo-1584100936595-c0654b55a2e2?w=600&q=80"
    },
    {
      name: "Ceramic Pour-Over Set",
      category: "Kitchen",
      desc: "Hand-thrown stoneware dripper and carafe glazed in ash-grey. Brews 2–4 cups beautifully.",
      price: 92,
      badge: "Bestseller",
      img: "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=600&q=80"
    },
    {
      name: "Beeswax Taper Candles",
      category: "Lighting",
      desc: "Pure beeswax tapers, hand-dipped in small batches. Burns clean with a warm honey scent.",
      price: 24,
      badge: null,
      img: "https://images.unsplash.com/photo-1603006905003-be475563bc59?w=600&q=80"
    },
    {
      name: "Walnut Serving Board",
      category: "Kitchen",
      desc: "Solid black walnut with a live edge, finished with food-safe mineral oil. Each piece is unique.",
      price: 135,
      badge: "New",
      img: "https://images.unsplash.com/photo-1528821128474-27f963b062bf?w=600&q=80"
    },
    {
      name: "Merino Wool Blanket",
      category: "Home Textiles",
      desc: "150g superfine merino woven on heritage looms in Portugal. Lightweight warmth year-round.",
      price: 178,
      badge: null,
      img: "https://images.unsplash.com/photo-1540555700478-4be289fbecef?w=600&q=80"
    },
    {
      name: "Terracotta Planter",
      category: "Garden",
      desc: "Unglazed terracotta with a hand-burnished rim. Ideal for herbs and succulents.",
      price: 36,
      badge: null,
      img: "https://images.unsplash.com/photo-1493556386767-7d9e0af27a79?w=600&q=80"
    },
    {
      name: "Lemongrass Body Oil",
      category: "Wellness",
      desc: "Cold-pressed jojoba and sweet almond oil with organic lemongrass essential oil. 60 ml.",
      price: 42,
      badge: "New",
      img: "https://images.unsplash.com/photo-1608248543803-ba4f8c70ae0b?w=600&q=80"
    },
    {
      name: "Oak Tray with Handles",
      category: "Home Decor",
      desc: "White oak tray with turned handles, sanded to 220-grit and finished in matte lacquer.",
      price: 68,
      badge: null,
      img: "https://images.unsplash.com/photo-1567538096630-e0c55bd6374c?w=600&q=80"
    }
  ];

  const grid = document.getElementById('grid');

  products.forEach(p => {
    const card = document.createElement('div');
    card.className = 'product-card';
    card.innerHTML = `
      <div class="img-wrap">
        <img src="${p.img}" alt="${p.name}" loading="lazy"/>
        ${p.badge ? `<span class="badge">${p.badge}</span>` : ''}
      </div>
      <div class="card-body">
        <div class="category">${p.category}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.desc}</div>
        <div class="card-footer">
          <div class="price">$${p.price.toFixed(2)}</div>
          <button class="add-btn">Add to Cart</button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
</script>
</body>
</html>
